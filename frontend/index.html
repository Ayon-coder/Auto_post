<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoPost Dashboard</title>
    <!-- BACKEND_CONFIG_INJECT -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        /* Loader animation */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

<div class="max-w-3xl mx-auto space-y-8">
    
    <!-- Header -->
    <header class="text-center space-y-2">
        <h1 class="text-4xl font-bold text-slate-800 tracking-tight">AutoPost Dashboard</h1>
        <p class="text-slate-500">Cross-post with Buffer. API keys and tokens are read from the server <code class="text-slate-600 bg-slate-100 px-1 rounded">.env</code> file.</p>
    </header>

    <!-- Global Alert Box (Hidden by default) -->
    <div id="alertBox" class="hidden p-4 rounded-xl border shadow-sm flex items-center space-x-3 transition-all">
        <svg id="alertIcon" class="w-6 h-6 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
            <!-- Icon path set via JS -->
        </svg>
        <span id="alertMessage" class="font-medium flex-1"></span>
        <button onclick="hideAlert()" class="text-slate-400 hover:text-slate-600 focus:outline-none">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
            </svg>
        </button>
    </div>

    <div class="grid grid-cols-1 gap-8">
        
        <!-- Post Creation Card -->
        <div class="glass rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-slate-50 border-b border-slate-200 px-6 py-4">
                <h2 class="text-xl font-semibold text-slate-800 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    Create Cross-Platform Post
                </h2>
            </div>
            <form id="postForm" class="p-6 space-y-6">
                
                <div class="space-y-3">
                    <span class="block text-sm font-medium text-slate-700">Select Post Destinations:</span>
                    <div class="flex items-center space-x-6 p-4 border border-slate-200 rounded-xl bg-slate-50">
                        <label class="inline-flex items-center cursor-pointer">
                            <input type="checkbox" name="platforms" value="linkedin" checked class="w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-3 text-slate-700 font-medium flex items-center">
                                <span class="bg-blue-600 text-white rounded p-1 mr-2 text-xs">in</span> LinkedIn
                            </span>
                        </label>
                        <label class="inline-flex items-center cursor-pointer">
                            <input type="checkbox" name="platforms" value="x" checked class="w-5 h-5 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                            <span class="ml-3 text-slate-700 font-medium flex items-center">
                                <span class="bg-black text-white rounded p-1 mr-2 text-xs font-bold leading-none" style="padding-bottom: 2px;">𝕏</span> X (Twitter)
                            </span>
                        </label>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-medium text-slate-700">Post Content</label>
                    <textarea name="content" id="postContent" rows="4" required class="w-full rounded-xl border-slate-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-3" placeholder="What do you want to share?"></textarea>
                </div>

                <div class="space-y-2">
                    <label class="block text-sm font-medium text-slate-700">Attach Images (Optional)</label>
                    <div class="flex items-center justify-center w-full">
                        <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-slate-300 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition duration-150">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                <svg class="w-8 h-8 mb-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                                <p class="mb-2 text-sm text-slate-500" id="fileLabel"><span class="font-semibold">Click to upload</span> or drag and drop</p>
                                <p class="text-xs text-slate-500">Multiple images supported. PNG, JPG or GIF (MAX. 10MB each)</p>
                            </div>
                            <input type="file" name="images" id="fileInput" class="hidden" accept="image/*" multiple />
                        </label>
                    </div>
                    
                    <!-- Image Preview Container -->
                    <div id="imagePreviewContainer" class="flex flex-wrap gap-3 mt-4"></div>
                </div>

                <button type="submit" id="submitPostBtn" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors disabled:opacity-75 disabled:cursor-not-allowed">
                    <span id="submitPostText">Publish to Selected</span>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    function sameOriginApiBase() {
        if (window.location.protocol === 'http:' || window.location.protocol === 'https:') {
            return window.location.origin.replace(/\/$/, '') + '/api';
        }
        return '';
    }

    /**
     * API base URL comes from server .env BACKEND_API_BASE_URL (injected as window.__BACKEND_API_BASE__)
     * or GET /api/config, or same-origin fallback.
     */
    async function resolveApiBaseUrl() {
        if (typeof window.__BACKEND_API_BASE__ === 'string' && window.__BACKEND_API_BASE__.length) {
            return window.__BACKEND_API_BASE__.replace(/\/$/, '');
        }
        const fallback = sameOriginApiBase();
        try {
            const res = await fetch('/api/config');
            if (!res.ok) throw new Error('config fetch failed');
            const data = await res.json();
            let base = (data.api_base_url || '').trim().replace(/\/$/, '');
            if (!base) return fallback;
            return base;
        } catch {
            return fallback;
        }
    }

    function showAlert(message, isSuccess) {
        const alertBox = document.getElementById('alertBox');
        const alertIcon = document.getElementById('alertIcon');
        const alertMessage = document.getElementById('alertMessage');
        alertMessage.textContent = message;
        alertBox.className = `p-4 rounded-xl border shadow-sm flex items-center space-x-3 transition-all mb-8 ${isSuccess ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-200 text-red-800'}`;
        if (isSuccess) {
            alertIcon.innerHTML = `<path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path>`;
        } else {
            alertIcon.innerHTML = `<path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path>`;
        }
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function hideAlert() {
        document.getElementById('alertBox').classList.add('hidden');
    }

    document.addEventListener('DOMContentLoaded', async function () {
        const API_BASE_URL = await resolveApiBaseUrl();

        const fileInput = document.getElementById('fileInput');
        const labelText = document.getElementById('fileLabel');
        const postForm = document.getElementById('postForm');
        const submitPostBtn = document.getElementById('submitPostBtn');
        const submitPostText = document.getElementById('submitPostText');
        const previewContainer = document.getElementById('imagePreviewContainer');

        let selectedFiles = [];
        let previewRenderId = 0;

        function syncFileInputFromList() {
            const dt = new DataTransfer();
            selectedFiles.forEach(function (f) {
                dt.items.add(f);
            });
            fileInput.files = dt.files;
        }

        function updateFileLabel() {
            const count = selectedFiles.length;
            if (count === 0) {
                labelText.innerHTML = `<span class="font-semibold">Click to upload</span> or drag and drop`;
            } else if (count === 1) {
                labelText.innerHTML = `<span class="font-semibold text-blue-600">Selected:</span> ${selectedFiles[0].name}`;
            } else {
                labelText.innerHTML = `<span class="font-semibold text-blue-600">Selected:</span> ${count} images`;
            }
        }

        function removeImageAt(index) {
            selectedFiles.splice(index, 1);
            syncFileInputFromList();
            updateFileLabel();
            renderImagePreviews();
        }

        function renderImagePreviews() {
            previewRenderId += 1;
            const renderId = previewRenderId;
            previewContainer.innerHTML = '';
            selectedFiles.forEach(function (file, index) {
                if (!file.type.startsWith('image/')) return;

                const reader = new FileReader();
                reader.onload = function (event) {
                    if (renderId !== previewRenderId) return;
                    const imgWrap = document.createElement('div');
                    imgWrap.className = 'relative rounded-lg overflow-hidden border border-slate-200 shadow-sm group';
                    imgWrap.style.width = '100px';
                    imgWrap.style.height = '100px';

                    const img = document.createElement('img');
                    img.src = event.target.result;
                    img.className = 'w-full h-full object-cover';
                    img.alt = file.name;

                    const removeBtn = document.createElement('button');
                    removeBtn.type = 'button';
                    removeBtn.title = 'Remove image';
                    removeBtn.setAttribute('aria-label', 'Remove image');
                    removeBtn.className =
                        'absolute top-1 right-1 flex h-7 w-7 items-center justify-center rounded-full bg-slate-900/80 text-white shadow hover:bg-red-600 focus:outline-none focus:ring-2 focus:ring-red-400';
                    removeBtn.innerHTML =
                        '<svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>';
                    removeBtn.addEventListener('click', function () {
                        removeImageAt(index);
                    });

                    imgWrap.appendChild(img);
                    imgWrap.appendChild(removeBtn);
                    previewContainer.appendChild(imgWrap);
                };
                reader.readAsDataURL(file);
            });
        }

        fileInput.addEventListener('change', function (e) {
            const newFiles = Array.from(e.target.files || []).filter(function (f) {
                return f.type.startsWith('image/');
            });
            if (newFiles.length === 0) return;

            selectedFiles = selectedFiles.concat(newFiles);
            syncFileInputFromList();
            updateFileLabel();
            renderImagePreviews();
        });

    // Handle Post Submit
    postForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        hideAlert();
        
        const content = document.getElementById('postContent').value.trim();
        if (!content) return;
        
        // Get selected platforms
        const selectedPlatforms = Array.from(document.querySelectorAll('input[name="platforms"]:checked')).map(cb => cb.value);
        if (selectedPlatforms.length === 0) {
            showAlert("Please select at least one platform (LinkedIn or X) to post to.", false);
            return;
        }

        // Loading state
        submitPostBtn.disabled = true;
        
        const hasImage = selectedFiles.length > 0;
        submitPostText.innerHTML = `<span class="loader"></span> ${hasImage ? 'Uploading & Publishing...' : 'Publishing...'}`;
        
        try {
            const formData = new FormData();
            formData.append('content', content);
            formData.append('platforms', selectedPlatforms.join(','));
            
            // Append all accumulated files
            selectedFiles.forEach(file => {
                formData.append('images', file);
            });
            
            const response = await fetch(`${API_BASE_URL}/post`, {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            showAlert(data.message, data.success);
            
            if (data.success) {
                // Reset form
                postForm.reset();
                labelText.innerHTML = `<span class="font-semibold">Click to upload</span> or drag and drop`;
                previewContainer.innerHTML = ''; // Clear previews
                selectedFiles = []; // Clear array
            }
        } catch (error) {
            showAlert(`Connection error: ${error.message}`, false);
        } finally {
            submitPostBtn.disabled = false;
            submitPostText.textContent = 'Publish to Selected';
        }
    });
    });
</script>

</body>
</html>
