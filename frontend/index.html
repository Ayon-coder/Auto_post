<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoPost Dashboard</title>
    <!-- BACKEND_CONFIG_INJECT -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        .loader-sm {
            border: 2px solid #e2e8f0;
            border-top: 2px solid #10b981;
            border-radius: 50%;
            width: 12px;
            height: 12px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Lightbox Styles */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            padding: 1rem;
            cursor: zoom-out;
        }

        #lightbox img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
            cursor: default;
        }

        #lightbox:target { display: flex; }
        .lightbox-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            color: white;
            font-size: 2rem;
            text-decoration: none;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .lightbox-close:hover { opacity: 1; }

        /* Login Overlay */
        #loginOverlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        #loginOverlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .login-card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1.5rem;
            padding: 1.5rem;
            width: calc(100% - 2rem);
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }
        @media (min-width: 640px) {
            .login-card { padding: 2.5rem; width: 100%; }
        }
        .login-card input {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: #f1f5f9;
            width: 100%;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .login-card input::placeholder { color: #64748b; }
        .login-card input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.25);
        }
        .login-btn {
            width: 100%;
            padding: 0.75rem;
            border: none;
            border-radius: 0.75rem;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.2s;
        }
        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px -5px rgba(59,130,246,0.4);
        }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .login-error {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 0.5rem;
            padding: 0.5rem 0.75rem;
            color: #fca5a5;
            font-size: 0.85rem;
            text-align: center;
        }
        .logout-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 1500;
            display: flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.5rem 1rem;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: 0.75rem;
            color: #ef4444;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .logout-btn:hover { background: rgba(239,68,68,0.2); }

        /* Mobile responsive overrides */
        @media (max-width: 639px) {
            #lightbox { padding: 0.5rem; }
            .lightbox-close { top: 0.75rem; right: 0.75rem; font-size: 1.5rem; }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

<!-- Login Overlay -->
<div id="loginOverlay">
    <div class="login-card">
        <div class="text-center mb-6">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-500 to-blue-700 mb-4 shadow-lg">
                <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-2xl font-bold text-white tracking-tight">AutoPost Login</h2>
            <p class="text-slate-400 text-sm mt-1">Enter your credentials to continue</p>
        </div>
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Username</label>
                <input type="text" id="loginUsername" placeholder="Enter username" autocomplete="username" required>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">Password</label>
                <div style="position:relative;">
                    <input type="password" id="loginPassword" placeholder="Enter password" autocomplete="current-password" required style="padding-right:2.75rem;">
                    <button type="button" id="togglePassword" onclick="togglePasswordVisibility()" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:#64748b;transition:color 0.2s;" title="Show password">
                        <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:1.25rem;height:1.25rem;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        <svg id="eyeOffIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:1.25rem;height:1.25rem;display:none;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L6.59 6.59m7.532 7.532l3.29 3.29M3 3l18 18"></path></svg>
                    </button>
                </div>
            </div>
            <div id="loginError" class="login-error" style="display:none;"></div>
            <button type="submit" id="loginBtn" class="login-btn mt-2">Sign In</button>
        </form>
    </div>
</div>

<!-- Logout Button (hidden until logged in) -->
<button id="logoutBtn" class="logout-btn" style="display:none;" onclick="handleLogout()">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
    Logout
</button>

<div id="dashboardContent" class="max-w-4xl mx-auto space-y-8" style="display:none;">
    
    <!-- Header -->
    <header class="text-center space-y-2">
        <h1 class="text-2xl sm:text-4xl font-bold text-slate-800 tracking-tight">AutoPost Dashboard</h1>
        <p class="text-sm sm:text-base text-slate-500">Cross-post with Buffer. Manage unique content for every platform.</p>
    </header>

    <!-- Global Alert Box -->
    <div id="alertBox" class="hidden p-3 sm:p-4 rounded-xl border shadow-sm flex flex-col sm:flex-row items-start sm:items-center gap-2 sm:space-x-3 transition-all">
        <svg id="alertIcon" class="w-6 h-6 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"></svg>
        <span id="alertMessage" class="font-medium flex-1"></span>
        <button onclick="hideAlert()" class="text-slate-400 hover:text-slate-600 focus:outline-none">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
            </svg>
        </button>
    </div>

    <form id="postForm" class="space-y-8">
        <!-- Configuration Card -->
        <div class="glass rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-slate-50 border-b border-slate-200 px-4 sm:px-6 py-3 sm:py-4">
                <h2 class="text-base sm:text-xl font-semibold text-slate-800 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Post Configuration
                </h2>
            </div>
            <div class="p-4 sm:p-6 space-y-5 sm:space-y-6">
                <!-- Destinations -->
                <div class="space-y-3">
                    <span class="block text-sm font-medium text-slate-700">Select Platforms:</span>
                    <div class="grid grid-cols-2 sm:flex sm:flex-wrap gap-2 sm:gap-4">
                        <label class="inline-flex items-center cursor-pointer p-3 border border-slate-200 rounded-xl bg-slate-50 hover:bg-slate-100 transition">
                            <input type="checkbox" name="platforms" value="linkedin" checked class="platform-checkbox w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-3 text-slate-700 font-medium">LinkedIn</span>
                        </label>
                        <label class="inline-flex items-center cursor-pointer p-3 border border-slate-200 rounded-xl bg-slate-50 hover:bg-slate-100 transition">
                            <input type="checkbox" name="platforms" value="x" checked class="platform-checkbox w-5 h-5 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                            <span class="ml-3 text-slate-700 font-medium">X (Twitter)</span>
                        </label>
                        <label class="inline-flex items-center cursor-pointer p-3 border border-slate-200 rounded-xl bg-slate-50 hover:bg-slate-100 transition">
                            <input type="checkbox" name="platforms" value="instagram" checked class="platform-checkbox w-5 h-5 rounded border-slate-300 text-pink-600 focus:ring-pink-500">
                            <span class="ml-3 text-slate-700 font-medium">Instagram</span>
                        </label>
                        <label class="inline-flex items-center cursor-pointer p-3 border border-slate-200 rounded-xl bg-slate-50 hover:bg-slate-100 transition">
                            <input type="checkbox" name="platforms" value="facebook" checked class="platform-checkbox w-5 h-5 rounded border-slate-300 text-blue-700 focus:ring-blue-600">
                            <span class="ml-3 text-slate-700 font-medium">Facebook</span>
                        </label>
                    </div>
                </div>

                <!-- Mode Selector -->
                <div class="space-y-3">
                    <span class="block text-sm font-medium text-slate-700">Content Mode:</span>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 sm:gap-4">
                        <label class="relative flex flex-col p-4 border rounded-xl cursor-pointer focus:outline-none transition group hover:shadow-md border-blue-500 bg-blue-50" id="modeSameLabel">
                            <input type="radio" name="mode" value="same" checked class="sr-only">
                            <span class="block text-sm font-bold text-blue-700">Same Content</span>
                            <span class="mt-1 block text-xs text-blue-600">Post the same text and images to all platforms.</span>
                        </label>
                        <label class="relative flex flex-col p-4 border rounded-xl cursor-pointer focus:outline-none transition group hover:shadow-md border-slate-200 bg-white" id="modeCustomLabel">
                            <input type="radio" name="mode" value="custom" class="sr-only">
                            <span class="block text-sm font-bold text-slate-700">Custom Content</span>
                            <span class="mt-1 block text-xs text-slate-500">Create unique posts for each target platform.</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dynamic Content Sections -->
        <div id="dynamicInputs" class="space-y-6"></div>

        <!-- Submit Button -->
        <div class="flex justify-end pt-4">
            <button type="submit" id="submitPostBtn" class="w-full sm:w-auto min-w-[200px] flex justify-center py-3 sm:py-4 px-6 sm:px-8 border border-transparent rounded-2xl shadow-lg text-base sm:text-lg font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all disabled:opacity-75 disabled:cursor-not-allowed">
                <span id="submitPostText">Publish Post</span>
            </button>
        </div>
    </form>
</div> <!-- end dashboardContent -->

<!-- Image Lightbox Modal -->
<div id="lightbox" onclick="this.style.display='none'">
    <span class="lightbox-close">&times;</span>
    <img id="lightboxImg" src="" onclick="event.stopPropagation()">
</div>

<script>
    function openLightbox(src) {
        const lightbox = document.getElementById('lightbox');
        const img = document.getElementById('lightboxImg');
        img.src = src;
        lightbox.style.display = 'flex';
    }

    function togglePasswordVisibility() {
        const input = document.getElementById('loginPassword');
        const eyeIcon = document.getElementById('eyeIcon');
        const eyeOffIcon = document.getElementById('eyeOffIcon');
        if (input.type === 'password') {
            input.type = 'text';
            eyeIcon.style.display = 'none';
            eyeOffIcon.style.display = '';
        } else {
            input.type = 'password';
            eyeIcon.style.display = '';
            eyeOffIcon.style.display = 'none';
        }
    }

    // --- Auth Helpers ---
    function getAuthToken() { return sessionStorage.getItem('auth_token'); }
    function setAuthToken(token) { sessionStorage.setItem('auth_token', token); }
    function clearAuthToken() { sessionStorage.removeItem('auth_token'); }

    function showDashboard() {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('dashboardContent').style.display = '';
        document.getElementById('logoutBtn').style.display = '';
    }
    function showLogin() {
        document.getElementById('loginOverlay').classList.remove('hidden');
        document.getElementById('dashboardContent').style.display = 'none';
        document.getElementById('logoutBtn').style.display = 'none';
    }

    async function handleLogout() {
        const API_BASE_URL = await resolveApiBaseUrl();
        const token = getAuthToken();
        try {
            await fetch(`${API_BASE_URL}/logout`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
        } catch {}
        clearAuthToken();
        showLogin();
    }

    // --- API Configuration ---
    async function resolveApiBaseUrl() {
        if (typeof window.__BACKEND_API_BASE__ === 'string' && window.__BACKEND_API_BASE__.length) {
            return window.__BACKEND_API_BASE__.replace(/\/$/, '');
        }
        try {
            const res = await fetch('/api/config');
            if (res.ok) {
                const data = await res.json();
                return (data.api_base_url || '').trim().replace(/\/$/, '');
            }
        } catch {}
        return window.location.origin.replace(/\/$/, '') + '/api';
    }

    // --- UI Helpers ---
    function showAlert(message, isSuccess, platforms = {}) {
        const alertBox = document.getElementById('alertBox');
        const alertIcon = document.getElementById('alertIcon');
        const alertMessage = document.getElementById('alertMessage');
        alertMessage.innerHTML = `<p class="font-bold">${message}</p>`;

        if (isSuccess && platforms && Object.keys(platforms).length > 0) {
            const container = document.createElement('div');
            container.className = 'mt-3 space-y-3 w-full';
            
            const resolvedLinks = {};

            Object.entries(platforms).forEach(([name, res]) => {
                const pKey = name.toLowerCase();
                const group = document.createElement('div');
                group.className = 'flex items-center space-x-3 bg-white/50 p-2 rounded-lg border border-emerald-100 shadow-sm';
                
                const label = document.createElement('span');
                // Increased width to w-24 to prevent overlap with "INSTAGRAM"
                label.className = 'text-[10px] font-black uppercase tracking-widest text-emerald-600 w-20 flex-shrink-0';
                label.innerText = pKey;
                group.appendChild(label);

                const statusSpan = document.createElement('span');
                statusSpan.className = 'flex-1 text-sm text-emerald-700 font-medium flex items-center justify-between overflow-hidden';
                
                if (res.link) {
                    resolvedLinks[pKey] = res.link;
                    renderLinkGroup(statusSpan, res.link);
                } else {
                    statusSpan.innerHTML = `<span class="flex items-center text-slate-500 italic"><span class="loader-sm mr-2"></span> Processing...</span>`;
                    pollForLink(pKey, res.post_id, statusSpan, res.fallback, resolvedLinks);
                }
                
                group.appendChild(statusSpan);
                container.appendChild(group);
            });

            const copyBtnContainer = document.createElement('div');
            copyBtnContainer.className = 'mt-4 pt-3 border-t border-emerald-100/50';
            
            const copyAllBtn = document.createElement('button');
            copyAllBtn.type = 'button';
            copyAllBtn.className = 'w-full py-2 bg-emerald-100 hover:bg-emerald-200 text-emerald-800 font-bold rounded-lg transition-all text-sm flex items-center justify-center focus:outline-none';
            const copyIcon = `<svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>`;
            copyAllBtn.innerHTML = `${copyIcon} Copy All Formatted Links`;
            
            const formatUrl = (platform, url) => {
                if (!url) return '';
                if (platform === 'x' || platform === 'twitter') {
                    return url.replace('twitter.com', 'x.com');
                }
                return url;
            };

            copyAllBtn.onclick = async () => {
                const parts = [];
                if (resolvedLinks['instagram']) parts.push(`Instagram : ${formatUrl('instagram', resolvedLinks['instagram'])}`);
                if (resolvedLinks['facebook']) parts.push(`Facebook : ${formatUrl('facebook', resolvedLinks['facebook'])}`);
                if (resolvedLinks['linkedin']) parts.push(`LinkedIn : ${formatUrl('linkedin', resolvedLinks['linkedin'])}`);
                if (resolvedLinks['x'] || resolvedLinks['twitter']) parts.push(`Twitter : ${formatUrl('x', resolvedLinks['x'] || resolvedLinks['twitter'])}`);
                
                const text = parts.join('\n');
                if (!text) {
                    alert("No links ready yet! Please wait for posts to finish processing.");
                    return;
                }
                
                try {
                    await navigator.clipboard.writeText(text);
                    copyAllBtn.innerHTML = `<svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Copied!`;
                    copyAllBtn.classList.replace('bg-emerald-100', 'bg-emerald-200');
                    copyAllBtn.classList.replace('text-emerald-800', 'text-emerald-900');
                    setTimeout(() => {
                        copyAllBtn.innerHTML = `${copyIcon} Copy All Formatted Links`;
                        copyAllBtn.classList.replace('bg-emerald-200', 'bg-emerald-100');
                        copyAllBtn.classList.replace('text-emerald-900', 'text-emerald-800');
                    }, 2000);
                } catch (e) {
                    console.error("Copy failed", e);
                }
            };
            
            copyBtnContainer.appendChild(copyAllBtn);
            container.appendChild(copyBtnContainer);

            alertMessage.appendChild(container);
        }
        alertBox.className = `p-4 rounded-xl border shadow-sm flex items-center space-x-3 transition-all mb-8 ${isSuccess ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-200 text-red-800'}`;
        alertIcon.innerHTML = isSuccess ? '<path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"/>' : '<path d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"/>';
        alertIcon.setAttribute('viewBox', '0 0 20 20');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderLinkGroup(container, url) {
        container.innerHTML = `
            <div class="flex items-center space-x-2">
                <a href="${url}" target="_blank" class="hover:underline flex items-center font-bold">View Post</a>
                <span class="text-emerald-300">|</span>
                <button type="button" class="copy-btn hover:text-emerald-900 transition flex items-center">
                    Copy Link
                </button>
            </div>
            <svg class="w-4 h-4 text-emerald-400 flex-shrink-0 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        `;
        const btn = container.querySelector('.copy-btn');
        btn.onclick = async () => {
            try {
                await navigator.clipboard.writeText(url);
                const originalText = btn.innerText;
                btn.innerText = 'Copied!';
                btn.classList.add('text-emerald-900');
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.remove('text-emerald-900');
                }, 2000);
            } catch (err) {
                console.error("Copy failed", err);
            }
        };
    }

    async function pollForLink(platform, postId, statusSpan, fallback, resolvedLinks = null) {
        const API_BASE_URL = await resolveApiBaseUrl();
        const maxAttempts = 20; // 20 * 3s = 60s max wait
        let consecutiveErrors = 0;
        
        for (let i = 0; i < maxAttempts; i++) {
            if (!document.body.contains(statusSpan)) return; // Stop if UI element removed

            await new Promise(r => setTimeout(r, 3000)); // wait 3s between calls
            
            try {
                const res = await fetch(`${API_BASE_URL}/check-link?post_id=${postId}&platform=${platform}`);
                
                // Stop immediately on server errors — retrying won't help
                if (res.status >= 500) {
                    let errMsg = "Server error";
                    try { const d = await res.json(); errMsg = d.error || errMsg; } catch {}
                    console.error(`[${platform}] check-link 500:`, errMsg);
                    statusSpan.innerHTML = `
                        <div class="flex items-center space-x-2">
                            <span class="text-red-600 font-bold flex items-center cursor-help" title="${errMsg}">
                                <svg class="w-4 h-4 mr-1 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
                                <span class="truncate max-w-[120px]">Server Error</span>
                            </span>
                            <span class="text-slate-300">|</span>
                            <a href="${fallback}" target="_blank" class="hover:underline flex items-center font-bold text-red-600 text-sm">Check Profile &rarr;</a>
                        </div>
                    `;
                    return;
                }

                if (res.status === 404) {
                    console.error(`[${platform}] check-link 404: post not found`);
                    statusSpan.innerHTML = `<a href="${fallback}" target="_blank" class="hover:underline flex items-center text-amber-700 font-medium italic">Post not found (Check Profile)</a>`;
                    return;
                }

                const data = await res.json();
                consecutiveErrors = 0; // reset on successful response

                if (data.ready) {
                    if (resolvedLinks) resolvedLinks[platform] = data.link;
                    renderLinkGroup(statusSpan, data.link);
                    return;
                }
                
                if (data.status === "failed" || data.status === "error") {
                    const errorMsg = data.error_message || "Post Failed";
                    statusSpan.innerHTML = `
                        <div class="flex items-center space-x-2">
                            <span class="text-red-600 font-bold flex items-center cursor-help" title="${errorMsg}">
                                <svg class="w-4 h-4 mr-1 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
                                <span class="truncate max-w-[120px]">${errorMsg}</span>
                            </span>
                            <span class="text-slate-300">|</span>
                            <a href="${fallback}" target="_blank" class="hover:underline flex items-center font-bold text-red-600 text-sm">Post Manually &rarr;</a>
                        </div>
                    `;
                    return;
                }
            } catch (err) {
                consecutiveErrors++;
                console.error("Polling error:", err);
                // Stop after 3 consecutive network errors
                if (consecutiveErrors >= 3) {
                    statusSpan.innerHTML = `<a href="${fallback}" target="_blank" class="hover:underline flex items-center text-amber-700 font-medium italic">Network error (Check Profile)</a>`;
                    return;
                }
            }
        }
        
        // Final resort if still not ready
        statusSpan.innerHTML = `<a href="${fallback}" target="_blank" class="hover:underline flex items-center text-amber-700 font-medium italic">Delayed (Check Profile)</a>`;
    }

    function hideAlert() { document.getElementById('alertBox').classList.add('hidden'); }

    // --- State Management ---
    const state = {
        mode: 'same', // 'same' or 'custom'
        selectedPlatforms: ['linkedin', 'x', 'instagram', 'facebook'],
        // Data for each platform (including 'global' for same mode)
        platformData: {
            global: { content: '', files: [] },
            linkedin: { content: '', files: [] },
            x: { content: '', files: [] },
            instagram: { content: '', files: [] },
            facebook: { content: '', files: [] }
        }
    };

    function renderInputs() {
        const container = document.getElementById('dynamicInputs');
        container.innerHTML = '';

        if (state.mode === 'same') {
            container.appendChild(createSection('global', 'Shared Post Content'));
        } else {
            state.selectedPlatforms.forEach(p => {
                let label = '';
                if (p === 'linkedin') label = 'LinkedIn Content';
                else if (p === 'x') label = 'X (Twitter) Content';
                else if (p === 'instagram') label = 'Instagram Content';
                else if (p === 'facebook') label = 'Facebook Content';
                container.appendChild(createSection(p, label));
            });
        }
        
        if (state.selectedPlatforms.length === 0) {
            container.innerHTML = '<div class="p-8 text-center text-slate-500 italic bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">Select at least one platform to begin.</div>';
        }
    }

    function createSection(pKey, title) {
        const section = document.createElement('div');
        section.className = 'glass rounded-2xl shadow-sm border border-slate-200 overflow-hidden';
        
        const platformData = state.platformData[pKey];
        const isGlobal = pKey === 'global';
        const brandColor = pKey === 'linkedin' ? 'text-blue-600' : (pKey === 'x' ? 'text-slate-900' : (pKey === 'facebook' ? 'text-blue-700' : 'text-slate-500'));

        section.innerHTML = `
            <div class="bg-white border-b border-slate-100 px-4 sm:px-6 py-3 sm:py-4 flex items-center justify-between">
                <h3 class="font-bold text-sm sm:text-base ${brandColor} flex items-center">
                    <span class="mr-2">${isGlobal ? '📋' : (pKey === 'linkedin' ? 'in' : (pKey === 'x' ? '𝕏' : (pKey === 'instagram' ? '📸' : '👤')))}</span> ${title}
                </h3>
            </div>
            <div class="p-4 sm:p-6 space-y-4">
                <textarea class="content-input w-full rounded-xl border-slate-200 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-3 sm:p-4 text-sm sm:text-base text-slate-600" 
                    rows="4" placeholder="Craft your message..." data-key="${pKey}">${platformData.content}</textarea>
                
                <div class="file-upload-zone relative">
                    <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-slate-200 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <svg class="w-6 h-6 mb-1 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                            <p class="text-xs text-slate-500"><span class="font-semibold">Add Images</span> for ${isGlobal ? 'these posts' : 'this post'}</p>
                            <p class="text-[10px] text-slate-400 mt-1">PNG, JPG, GIF, WebP</p>
                        </div>
                        <input type="file" class="file-input hidden" accept="image/*" multiple data-key="${pKey}">
                    </label>
                    <div class="preview-container flex flex-wrap gap-2 mt-3" data-key="${pKey}"></div>
                </div>
            </div>
        `;

        // Textarea Sync
        const textarea = section.querySelector('.content-input');
        textarea.addEventListener('input', (e) => state.platformData[pKey].content = e.target.value);

        // File Handling
        const fileInput = section.querySelector('.file-input');
        const previews = section.querySelector('.preview-container');
        
        const updatePreviews = () => {
            previews.innerHTML = '';
            state.platformData[pKey].files.forEach((file, idx) => {
                const div = document.createElement('div');
                div.className = 'relative w-14 h-14 sm:w-16 sm:h-16 rounded-lg border shadow-sm group overflow-hidden bg-slate-50';

                const reader = new FileReader();
                reader.onload = (e) => {
                    div.classList.add('cursor-zoom-in');
                    div.innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover" onclick="openLightbox('${e.target.result}')">
                        <button type="button" class="absolute top-0 right-0 bg-red-500 text-white p-0.5 rounded-bl shadow hidden group-hover:block z-10" data-idx="${idx}">×</button>`;
                    div.querySelector('button').onclick = (ev) => {
                        ev.stopPropagation();
                        state.platformData[pKey].files.splice(idx, 1);
                        updatePreviews();
                    };
                };
                reader.readAsDataURL(file);
                previews.appendChild(div);
            });
        };

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files).filter(f => 
                f.type.startsWith('image/')
            );
            state.platformData[pKey].files = [...state.platformData[pKey].files, ...files];
            updatePreviews();
            e.target.value = ''; // Reset for next selection
        });

        // Initialize previews if data exists
        if (platformData.files.length) updatePreviews();

        return section;
    }

    // --- Core Logic ---
    document.addEventListener('DOMContentLoaded', async () => {
        const API_BASE_URL = await resolveApiBaseUrl();

        // --- Login Form ---
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
            loginError.style.display = 'none';

            try {
                const res = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success && data.token) {
                    setAuthToken(data.token);
                    showDashboard();
                } else {
                    loginError.textContent = data.message || 'Login failed.';
                    loginError.style.display = 'block';
                }
            } catch (err) {
                loginError.textContent = 'Network error. Please try again.';
                loginError.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });

        // Check for existing session
        if (getAuthToken()) {
            showDashboard();
        } else {
            showLogin();
        }

        // Platform Selection
        document.querySelectorAll('.platform-checkbox').forEach(cb => {
            cb.addEventListener('change', () => {
                state.selectedPlatforms = Array.from(document.querySelectorAll('.platform-checkbox:checked')).map(el => el.value);
                renderInputs();
            });
        });

        // Mode Switching
        document.querySelectorAll('input[name="mode"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                state.mode = e.target.value;
                document.getElementById('modeSameLabel').className = state.mode === 'same' ? 'relative flex flex-col p-4 border rounded-xl cursor-pointer transition border-blue-500 bg-blue-50 shadow-md' : 'relative flex flex-col p-4 border rounded-xl cursor-pointer transition border-slate-200 bg-white';
                document.getElementById('modeCustomLabel').className = state.mode === 'custom' ? 'relative flex flex-col p-4 border rounded-xl cursor-pointer transition border-blue-500 bg-blue-50 shadow-md' : 'relative flex flex-col p-4 border rounded-xl cursor-pointer transition border-slate-200 bg-white';
                renderInputs();
            });
        });

        // Form Submit
        const postForm = document.getElementById('postForm');
        const submitBtn = document.getElementById('submitPostBtn');
        const submitText = document.getElementById('submitPostText');

        postForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            if (state.selectedPlatforms.length === 0) {
                showAlert("Please select at least one platform.", false);
                return;
            }

            submitBtn.disabled = true;
            submitText.innerHTML = '<span class="loader"></span> Publishing...';

            try {
                const formData = new FormData();
                formData.append('mode', state.mode);
                formData.append('platforms', state.selectedPlatforms.join(','));

                if (state.mode === 'same') {
                    formData.append('content', state.platformData.global.content);
                    state.platformData.global.files.forEach(f => formData.append('images', f));
                } else {
                    state.selectedPlatforms.forEach(p => {
                        formData.append(`${p}_content`, state.platformData[p].content);
                        state.platformData[p].files.forEach(f => formData.append(`${p}_images`, f));
                    });
                }

                const response = await fetch(`${API_BASE_URL}/post`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${getAuthToken()}` },
                    body: formData
                });

                // If 401, force re-login
                if (response.status === 401) {
                    clearAuthToken();
                    showLogin();
                    showAlert('Session expired. Please log in again.', false);
                    return;
                }
                
                const data = await response.json();
                showAlert(data.message, data.success, data.platforms);
                
                if (data.success) {
                    // Reset platform data
                    Object.values(state.platformData).forEach(d => { d.content = ''; d.files = []; });
                    renderInputs();
                }
            } catch (err) {
                showAlert(`Error: ${err.message}`, false);
            } finally {
                submitBtn.disabled = false;
                submitText.textContent = 'Publish Post';
            }
        });

        // Init
        renderInputs();
    });
</script>
