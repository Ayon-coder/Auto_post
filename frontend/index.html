<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoPost Dashboard</title>
    <!-- BACKEND_CONFIG_INJECT -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3498db;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        .loader-sm {
            border: 2px solid #e2e8f0;
            border-top: 2px solid #10b981;
            border-radius: 50%;
            width: 12px;
            height: 12px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Lightbox Styles */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            align-items: center;
            justify-content: center;
            padding: 2rem;
            cursor: zoom-out;
        }

        #lightbox img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
            cursor: default;
        }

        #lightbox:target { display: flex; }
        .lightbox-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            color: white;
            font-size: 2rem;
            text-decoration: none;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .lightbox-close:hover { opacity: 1; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

<div class="max-w-4xl mx-auto space-y-8">
    
    <!-- Header -->
    <header class="text-center space-y-2">
        <h1 class="text-4xl font-bold text-slate-800 tracking-tight">AutoPost Dashboard</h1>
        <p class="text-slate-500">Cross-post with Buffer. Manage unique content for every platform.</p>
    </header>

    <!-- Global Alert Box -->
    <div id="alertBox" class="hidden p-4 rounded-xl border shadow-sm flex items-center space-x-3 transition-all">
        <svg id="alertIcon" class="w-6 h-6 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"></svg>
        <span id="alertMessage" class="font-medium flex-1"></span>
        <button onclick="hideAlert()" class="text-slate-400 hover:text-slate-600 focus:outline-none">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
            </svg>
        </button>
    </div>

    <form id="postForm" class="space-y-8">
        <!-- Configuration Card -->
        <div class="glass rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="bg-slate-50 border-b border-slate-200 px-6 py-4">
                <h2 class="text-xl font-semibold text-slate-800 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    Post Configuration
                </h2>
            </div>
            <div class="p-6 space-y-6">
                <!-- Destinations -->
                <div class="space-y-3">
                    <span class="block text-sm font-medium text-slate-700">Select Platforms:</span>
                    <div class="flex flex-wrap gap-4">
                        <label class="inline-flex items-center cursor-pointer p-3 border border-slate-200 rounded-xl bg-slate-50 hover:bg-slate-100 transition">
                            <input type="checkbox" name="platforms" value="linkedin" checked class="platform-checkbox w-5 h-5 rounded border-slate-300 text-blue-600 focus:ring-blue-500">
                            <span class="ml-3 text-slate-700 font-medium">LinkedIn</span>
                        </label>
                        <label class="inline-flex items-center cursor-pointer p-3 border border-slate-200 rounded-xl bg-slate-50 hover:bg-slate-100 transition">
                            <input type="checkbox" name="platforms" value="x" checked class="platform-checkbox w-5 h-5 rounded border-slate-300 text-slate-900 focus:ring-slate-900">
                            <span class="ml-3 text-slate-700 font-medium">X (Twitter)</span>
                        </label>
                        <label class="inline-flex items-center cursor-pointer p-3 border border-slate-200 rounded-xl bg-slate-50 hover:bg-slate-100 transition">
                            <input type="checkbox" name="platforms" value="instagram" checked class="platform-checkbox w-5 h-5 rounded border-slate-300 text-pink-600 focus:ring-pink-500">
                            <span class="ml-3 text-slate-700 font-medium">Instagram</span>
                        </label>
                        <label class="inline-flex items-center cursor-pointer p-3 border border-slate-200 rounded-xl bg-slate-50 hover:bg-slate-100 transition">
                            <input type="checkbox" name="platforms" value="facebook" checked class="platform-checkbox w-5 h-5 rounded border-slate-300 text-blue-700 focus:ring-blue-600">
                            <span class="ml-3 text-slate-700 font-medium">Facebook</span>
                        </label>
                    </div>
                </div>

                <!-- Mode Selector -->
                <div class="space-y-3">
                    <span class="block text-sm font-medium text-slate-700">Content Mode:</span>
                    <div class="grid grid-cols-2 gap-4">
                        <label class="relative flex flex-col p-4 border rounded-xl cursor-pointer focus:outline-none transition group hover:shadow-md border-blue-500 bg-blue-50" id="modeSameLabel">
                            <input type="radio" name="mode" value="same" checked class="sr-only">
                            <span class="block text-sm font-bold text-blue-700">Same Content</span>
                            <span class="mt-1 block text-xs text-blue-600">Post the same text and images to all platforms.</span>
                        </label>
                        <label class="relative flex flex-col p-4 border rounded-xl cursor-pointer focus:outline-none transition group hover:shadow-md border-slate-200 bg-white" id="modeCustomLabel">
                            <input type="radio" name="mode" value="custom" class="sr-only">
                            <span class="block text-sm font-bold text-slate-700">Custom Content</span>
                            <span class="mt-1 block text-xs text-slate-500">Create unique posts for each target platform.</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dynamic Content Sections -->
        <div id="dynamicInputs" class="space-y-6"></div>

        <!-- Submit Button -->
        <div class="flex justify-end pt-4">
            <button type="submit" id="submitPostBtn" class="w-full md:w-auto min-w-[200px] flex justify-center py-4 px-8 border border-transparent rounded-2xl shadow-lg text-lg font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all disabled:opacity-75 disabled:cursor-not-allowed">
                <span id="submitPostText">Publish Post</span>
            </button>
        </div>
    </form>
</div>

<!-- Image Lightbox Modal -->
<div id="lightbox" onclick="this.style.display='none'">
    <span class="lightbox-close">&times;</span>
    <img id="lightboxImg" src="" onclick="event.stopPropagation()">
</div>

<script>
    function openLightbox(src) {
        const lightbox = document.getElementById('lightbox');
        const img = document.getElementById('lightboxImg');
        img.src = src;
        lightbox.style.display = 'flex';
    }
    // --- API Configuration ---
    async function resolveApiBaseUrl() {
        if (typeof window.__BACKEND_API_BASE__ === 'string' && window.__BACKEND_API_BASE__.length) {
            return window.__BACKEND_API_BASE__.replace(/\/$/, '');
        }
        try {
            const res = await fetch('/api/config');
            if (res.ok) {
                const data = await res.json();
                return (data.api_base_url || '').trim().replace(/\/$/, '');
            }
        } catch {}
        return window.location.origin.replace(/\/$/, '') + '/api';
    }

    // --- UI Helpers ---
    function showAlert(message, isSuccess, platforms = {}) {
        const alertBox = document.getElementById('alertBox');
        const alertIcon = document.getElementById('alertIcon');
        const alertMessage = document.getElementById('alertMessage');
        alertMessage.innerHTML = `<p class="font-bold">${message}</p>`;

        if (isSuccess && platforms && Object.keys(platforms).length > 0) {
            const container = document.createElement('div');
            container.className = 'mt-3 space-y-3 w-full';
            
            const resolvedLinks = {};

            Object.entries(platforms).forEach(([name, res]) => {
                const pKey = name.toLowerCase();
                const group = document.createElement('div');
                group.className = 'flex items-center space-x-3 bg-white/50 p-2 rounded-lg border border-emerald-100 shadow-sm';
                
                const label = document.createElement('span');
                // Increased width to w-24 to prevent overlap with "INSTAGRAM"
                label.className = 'text-[10px] font-black uppercase tracking-widest text-emerald-600 w-20 flex-shrink-0';
                label.innerText = pKey;
                group.appendChild(label);

                const statusSpan = document.createElement('span');
                statusSpan.className = 'flex-1 text-sm text-emerald-700 font-medium flex items-center justify-between overflow-hidden';
                
                if (res.link) {
                    resolvedLinks[pKey] = res.link;
                    renderLinkGroup(statusSpan, res.link);
                } else {
                    statusSpan.innerHTML = `<span class="flex items-center text-slate-500 italic"><span class="loader-sm mr-2"></span> Processing...</span>`;
                    pollForLink(pKey, res.post_id, statusSpan, res.fallback, resolvedLinks);
                }
                
                group.appendChild(statusSpan);
                container.appendChild(group);
            });

            const copyBtnContainer = document.createElement('div');
            copyBtnContainer.className = 'mt-4 pt-3 border-t border-emerald-100/50';
            
            const copyAllBtn = document.createElement('button');
            copyAllBtn.type = 'button';
            copyAllBtn.className = 'w-full py-2 bg-emerald-100 hover:bg-emerald-200 text-emerald-800 font-bold rounded-lg transition-all text-sm flex items-center justify-center focus:outline-none';
            const copyIcon = `<svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>`;
            copyAllBtn.innerHTML = `${copyIcon} Copy All Formatted Links`;
            
            const formatUrl = (platform, url) => {
                if (!url) return '';
                if (platform === 'x' || platform === 'twitter') {
                    return url.replace('twitter.com', 'x.com');
                }
                return url;
            };

            copyAllBtn.onclick = async () => {
                const parts = [];
                if (resolvedLinks['instagram']) parts.push(`Instagram : ${formatUrl('instagram', resolvedLinks['instagram'])}`);
                if (resolvedLinks['facebook']) parts.push(`Facebook : ${formatUrl('facebook', resolvedLinks['facebook'])}`);
                if (resolvedLinks['linkedin']) parts.push(`LinkedIn : ${formatUrl('linkedin', resolvedLinks['linkedin'])}`);
                if (resolvedLinks['x'] || resolvedLinks['twitter']) parts.push(`Twitter : ${formatUrl('x', resolvedLinks['x'] || resolvedLinks['twitter'])}`);
                
                const text = parts.join('\n');
                if (!text) {
                    alert("No links ready yet! Please wait for posts to finish processing.");
                    return;
                }
                
                try {
                    await navigator.clipboard.writeText(text);
                    copyAllBtn.innerHTML = `<svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Copied!`;
                    copyAllBtn.classList.replace('bg-emerald-100', 'bg-emerald-200');
                    copyAllBtn.classList.replace('text-emerald-800', 'text-emerald-900');
                    setTimeout(() => {
                        copyAllBtn.innerHTML = `${copyIcon} Copy All Formatted Links`;
                        copyAllBtn.classList.replace('bg-emerald-200', 'bg-emerald-100');
                        copyAllBtn.classList.replace('text-emerald-900', 'text-emerald-800');
                    }, 2000);
                } catch (e) {
                    console.error("Copy failed", e);
                }
            };
            
            copyBtnContainer.appendChild(copyAllBtn);
            container.appendChild(copyBtnContainer);

            alertMessage.appendChild(container);
        }
        alertBox.className = `p-4 rounded-xl border shadow-sm flex items-center space-x-3 transition-all mb-8 ${isSuccess ? 'bg-emerald-50 border-emerald-200 text-emerald-800' : 'bg-red-50 border-red-200 text-red-800'}`;
        alertIcon.innerHTML = isSuccess ? '<path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"/>' : '<path d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"/>';
        alertIcon.setAttribute('viewBox', '0 0 20 20');
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderLinkGroup(container, url) {
        container.innerHTML = `
            <div class="flex items-center space-x-2">
                <a href="${url}" target="_blank" class="hover:underline flex items-center font-bold">View Post</a>
                <span class="text-emerald-300">|</span>
                <button type="button" class="copy-btn hover:text-emerald-900 transition flex items-center">
                    Copy Link
                </button>
            </div>
            <svg class="w-4 h-4 text-emerald-400 flex-shrink-0 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        `;
        const btn = container.querySelector('.copy-btn');
        btn.onclick = async () => {
            try {
                await navigator.clipboard.writeText(url);
                const originalText = btn.innerText;
                btn.innerText = 'Copied!';
                btn.classList.add('text-emerald-900');
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.remove('text-emerald-900');
                }, 2000);
            } catch (err) {
                console.error("Copy failed", err);
            }
        };
    }

    async function pollForLink(platform, postId, statusSpan, fallback, resolvedLinks = null) {
        const API_BASE_URL = await resolveApiBaseUrl();
        let attempts = 0;
        const maxAttempts = 30; 
        
        const check = async () => {
            if (!document.body.contains(statusSpan)) return;

            attempts++;
            try {
                const res = await fetch(`${API_BASE_URL}/check-link?platform=${platform}&post_id=${postId}`);
                if (!res.ok) throw new Error("API call failed");
                const data = await res.json();
                
                if (data.success && data.link) {
                    if (resolvedLinks) resolvedLinks[platform] = data.link;
                    renderLinkGroup(statusSpan, data.link);
                    return;
                }
                
                if (data.status === 'error' || data.status === 'failed') {
                    const errorMsg = data.error_message || "Post Failed";
                    statusSpan.innerHTML = `
                        <div class="flex items-center space-x-2">
                            <span class="text-red-600 font-bold flex items-center cursor-help" title="${errorMsg}">
                                <svg class="w-4 h-4 mr-1 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
                                <span class="truncate max-w-[120px]">${errorMsg}</span>
                            </span>
                            <span class="text-slate-300">|</span>
                            <a href="${fallback}" target="_blank" class="hover:underline flex items-center font-bold text-red-600 text-sm">Post Manually &rarr;</a>
                        </div>
                    `;
                    return;
                }
                
                if (attempts >= maxAttempts) {
                    statusSpan.innerHTML = `<a href="${fallback}" target="_blank" class="hover:underline flex items-center text-amber-700 font-medium italic">Delayed (Check Profile)</a>`;
                    return;
                }
                
                setTimeout(check, 2000);
            } catch (err) {
                console.error("Polling error:", err);
                setTimeout(check, 3000);
            }
        };
        setTimeout(check, 2000);
    }

    function hideAlert() { document.getElementById('alertBox').classList.add('hidden'); }

    // --- State Management ---
    const state = {
        mode: 'same', // 'same' or 'custom'
        selectedPlatforms: ['linkedin', 'x', 'instagram', 'facebook'],
        // Data for each platform (including 'global' for same mode)
        platformData: {
            global: { content: '', files: [] },
            linkedin: { content: '', files: [] },
            x: { content: '', files: [] },
            instagram: { content: '', files: [] },
            facebook: { content: '', files: [] }
        }
    };

    function renderInputs() {
        const container = document.getElementById('dynamicInputs');
        container.innerHTML = '';

        if (state.mode === 'same') {
            container.appendChild(createSection('global', 'Shared Post Content'));
        } else {
            state.selectedPlatforms.forEach(p => {
                let label = '';
                if (p === 'linkedin') label = 'LinkedIn Content';
                else if (p === 'x') label = 'X (Twitter) Content';
                else if (p === 'instagram') label = 'Instagram Content';
                else if (p === 'facebook') label = 'Facebook Content';
                container.appendChild(createSection(p, label));
            });
        }
        
        if (state.selectedPlatforms.length === 0) {
            container.innerHTML = '<div class="p-8 text-center text-slate-500 italic bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">Select at least one platform to begin.</div>';
        }
    }

    function createSection(pKey, title) {
        const section = document.createElement('div');
        section.className = 'glass rounded-2xl shadow-sm border border-slate-200 overflow-hidden';
        
        const platformData = state.platformData[pKey];
        const isGlobal = pKey === 'global';
        const brandColor = pKey === 'linkedin' ? 'text-blue-600' : (pKey === 'x' ? 'text-slate-900' : (pKey === 'facebook' ? 'text-blue-700' : 'text-slate-500'));

        section.innerHTML = `
            <div class="bg-white border-b border-slate-100 px-6 py-4 flex items-center justify-between">
                <h3 class="font-bold ${brandColor} flex items-center">
                    <span class="mr-2">${isGlobal ? '📋' : (pKey === 'linkedin' ? 'in' : (pKey === 'x' ? '𝕏' : (pKey === 'instagram' ? '📸' : '👤')))}</span> ${title}
                </h3>
            </div>
            <div class="p-6 space-y-4">
                <textarea class="content-input w-full rounded-xl border-slate-200 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-4 text-slate-600" 
                    rows="4" placeholder="Craft your message..." data-key="${pKey}">${platformData.content}</textarea>
                
                <div class="file-upload-zone relative">
                    <label class="flex flex-col items-center justify-center w-full h-24 border-2 border-slate-200 border-dashed rounded-xl cursor-pointer bg-slate-50 hover:bg-slate-100 transition">
                        <div class="flex flex-col items-center justify-center pt-5 pb-6">
                            <svg class="w-6 h-6 mb-1 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                            <p class="text-xs text-slate-500"><span class="font-semibold">Add Media</span> for ${isGlobal ? 'these posts' : 'this post'}</p>
                            <p class="text-[10px] text-slate-400 mt-1">Images, Videos, or PDFs</p>
                        </div>
                        <input type="file" class="file-input hidden" accept="image/*,video/*,application/pdf" multiple data-key="${pKey}">
                    </label>
                    <div class="preview-container flex flex-wrap gap-2 mt-3" data-key="${pKey}"></div>
                </div>
            </div>
        `;

        // Textarea Sync
        const textarea = section.querySelector('.content-input');
        textarea.addEventListener('input', (e) => state.platformData[pKey].content = e.target.value);

        // File Handling
        const fileInput = section.querySelector('.file-input');
        const previews = section.querySelector('.preview-container');
        
        const updatePreviews = () => {
            previews.innerHTML = '';
            state.platformData[pKey].files.forEach((file, idx) => {
                const div = document.createElement('div');
                div.className = 'relative w-16 h-16 rounded-lg border shadow-sm group overflow-hidden bg-slate-50';
                
                const isImage = file.type.startsWith('image/');
                const isVideo = file.type.startsWith('video/');
                const isPdf = file.type === 'application/pdf';

                if (isImage) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        div.classList.add('cursor-zoom-in');
                        div.innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover" onclick="openLightbox('${e.target.result}')">
                            <button type="button" class="absolute top-0 right-0 bg-red-500 text-white p-0.5 rounded-bl shadow hidden group-hover:block z-10" data-idx="${idx}">×</button>`;
                        div.querySelector('button').onclick = (ev) => {
                            ev.stopPropagation();
                            state.platformData[pKey].files.splice(idx, 1);
                            updatePreviews();
                        };
                    };
                    reader.readAsDataURL(file);
                } else {
                    // Video or PDF placeholders
                    let icon = '';
                    let label = '';
                    let bgColor = '';
                    
                    if (isVideo) {
                        icon = '<svg class="w-6 h-6 text-indigo-500" fill="currentColor" viewBox="0 0 20 20"><path d="M2 6a2 2 0 012-2h12a2 2 0 012 2v8a2 2 0 01-2 2H4a2 2 0 01-2-2V6zm6.707 1.707l2.586 2.586-2.586 2.586A1 1 0 0010 14.586V5.414a1 1 0 00-1.293-.949l-2 2A1 1 0 006.293 7.293l2.586 2.586z"/></svg>';
                        label = 'VIDEO';
                        bgColor = 'bg-indigo-50';
                    } else if (isPdf) {
                        icon = '<svg class="w-6 h-6 text-red-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4zm2 6a1 1 0 011-1h6a1 1 0 110 2H7a1 1 0 01-1-1zm1 3a1 1 0 100 2h6a1 1 0 100-2H7z" clip-rule="evenodd"/></svg>';
                        label = 'PDF';
                        bgColor = 'bg-red-50';
                    }
                    
                    div.className = `relative w-16 h-16 rounded-lg border shadow-sm group overflow-hidden ${bgColor} flex flex-col items-center justify-center p-1`;
                    div.innerHTML = `
                        ${icon}
                        <span class="text-[8px] font-bold mt-1 truncate w-full text-center px-1">${file.name}</span>
                        <button type="button" class="absolute top-0 right-0 bg-red-500 text-white p-0.5 rounded-bl shadow hidden group-hover:block z-10" data-idx="${idx}">×</button>
                    `;
                    div.querySelector('button').onclick = (ev) => {
                        ev.stopPropagation();
                        state.platformData[pKey].files.splice(idx, 1);
                        updatePreviews();
                    };
                }
                previews.appendChild(div);
            });
        };

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files).filter(f => 
                f.type.startsWith('image/') || 
                f.type.startsWith('video/') || 
                f.type === 'application/pdf'
            );
            state.platformData[pKey].files = [...state.platformData[pKey].files, ...files];
            updatePreviews();
            e.target.value = ''; // Reset for next selection
        });

        // Initialize previews if data exists
        if (platformData.files.length) updatePreviews();

        return section;
    }

    // --- Core Logic ---
    document.addEventListener('DOMContentLoaded', async () => {
        const API_BASE_URL = await resolveApiBaseUrl();
        
        // Platform Selection
        document.querySelectorAll('.platform-checkbox').forEach(cb => {
            cb.addEventListener('change', () => {
                state.selectedPlatforms = Array.from(document.querySelectorAll('.platform-checkbox:checked')).map(el => el.value);
                renderInputs();
            });
        });

        // Mode Switching
        document.querySelectorAll('input[name="mode"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                state.mode = e.target.value;
                document.getElementById('modeSameLabel').className = state.mode === 'same' ? 'relative flex flex-col p-4 border rounded-xl cursor-pointer transition border-blue-500 bg-blue-50 shadow-md' : 'relative flex flex-col p-4 border rounded-xl cursor-pointer transition border-slate-200 bg-white';
                document.getElementById('modeCustomLabel').className = state.mode === 'custom' ? 'relative flex flex-col p-4 border rounded-xl cursor-pointer transition border-blue-500 bg-blue-50 shadow-md' : 'relative flex flex-col p-4 border rounded-xl cursor-pointer transition border-slate-200 bg-white';
                renderInputs();
            });
        });

        // Form Submit
        const postForm = document.getElementById('postForm');
        const submitBtn = document.getElementById('submitPostBtn');
        const submitText = document.getElementById('submitPostText');

        postForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            if (state.selectedPlatforms.length === 0) {
                showAlert("Please select at least one platform.", false);
                return;
            }

            submitBtn.disabled = true;
            submitText.innerHTML = '<span class="loader"></span> Publishing...';

            try {
                const formData = new FormData();
                formData.append('mode', state.mode);
                formData.append('platforms', state.selectedPlatforms.join(','));

                if (state.mode === 'same') {
                    formData.append('content', state.platformData.global.content);
                    state.platformData.global.files.forEach(f => formData.append('images', f));
                } else {
                    state.selectedPlatforms.forEach(p => {
                        formData.append(`${p}_content`, state.platformData[p].content);
                        state.platformData[p].files.forEach(f => formData.append(`${p}_images`, f));
                    });
                }

                const response = await fetch(`${API_BASE_URL}/post`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                showAlert(data.message, data.success, data.platforms);
                
                if (data.success) {
                    // Reset platform data
                    Object.values(state.platformData).forEach(d => { d.content = ''; d.files = []; });
                    renderInputs();
                }
            } catch (err) {
                showAlert(`Error: ${err.message}`, false);
            } finally {
                submitBtn.disabled = false;
                submitText.textContent = 'Publish Post';
            }
        });

        // Init
        renderInputs();
    });
</script>

</body>
</html>
