<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoPost Dashboard</title>
    <!-- BACKEND_CONFIG_INJECT -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #ecf0f5 100%);
            min-height: 100vh;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .modern-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modern-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }
        .loader {
            border: 3px solid rgba(59, 130, 246, 0.1);
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        .loader-sm {
            border: 2px solid rgba(16, 185, 129, 0.1);
            border-top: 2px solid #10b981;
            border-radius: 50%;
            width: 12px;
            height: 12px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .animate-fade-in { animation: fadeInDown 0.5s ease-out; }

        /* Lightbox Styles */
        #lightbox {
            display: none;
            position: fixed;
            z-index: 1000;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(12px);
            align-items: center;
            justify-content: center;
            padding: 1rem;
            cursor: zoom-out;
            animation: fadeInDown 0.3s ease-out;
        }

        #lightbox img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 16px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
            cursor: default;
        }

        #lightbox:target { display: flex; }
        .lightbox-close {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            color: white;
            font-size: 2rem;
            text-decoration: none;
            opacity: 0.6;
            transition: opacity 0.2s;
            z-index: 10;
        }
        .lightbox-close:hover { opacity: 1; }

        /* Login Overlay */
        #loginOverlay {
            position: fixed;
            inset: 0;
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(15, 23, 42, 0.95) 0%, rgba(30, 41, 59, 0.95) 50%, rgba(15, 23, 42, 0.95) 100%);
            backdrop-filter: blur(8px);
            transition: opacity 0.4s ease, visibility 0.4s ease;
            padding: 1rem;
        }
        #loginOverlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .login-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 2rem;
            padding: 2rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
            animation: fadeInDown 0.4s ease-out;
        }
        @media (max-width: 640px) {
            .login-card { 
                padding: 1.5rem;
                border-radius: 1.5rem;
                max-width: calc(100% - 2rem);
            }
        }
        .login-card input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 1rem;
            padding: 0.875rem 1.125rem;
            color: #f1f5f9;
            width: 100%;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .login-card input::placeholder { color: #94a3b8; }
        .login-card input:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.15);
            background: rgba(255,255,255,0.12);
        }
        .login-btn {
            width: 100%;
            padding: 0.875rem 1.25rem;
            border: none;
            border-radius: 1rem;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px -5px rgba(59, 130, 246, 0.3);
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px -5px rgba(59, 130, 246, 0.4);
        }
        .login-btn:active { transform: translateY(0); }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .login-error {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.4);
            border-radius: 0.75rem;
            padding: 0.75rem 1rem;
            color: #fca5a5;
            font-size: 0.875rem;
            text-align: center;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8">

<!-- Login Overlay -->
<div id="loginOverlay">
    <div class="login-card">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-blue-500 via-blue-600 to-blue-700 mb-5 shadow-2xl animate-fade-in">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 class="text-3xl sm:text-2xl font-bold text-white tracking-tight">AutoPost</h2>
            <p class="text-blue-100 text-sm mt-2">SCCSE Cross Platform Post</p>
        </div>
        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-xs font-semibold text-blue-100 mb-2 uppercase tracking-wider">Username</label>
                <input type="text" id="loginUsername" placeholder="Enter username" autocomplete="username" required>
            </div>
            <div>
                <label class="block text-xs font-semibold text-blue-100 mb-2 uppercase tracking-wider">Password</label>
                <div style="position:relative;">
                    <input type="password" id="loginPassword" placeholder="Enter password" autocomplete="current-password" required style="padding-right:2.75rem;">
                    <button type="button" id="togglePassword" onclick="togglePasswordVisibility()" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:#cbd5e1;transition:color 0.2s;hover:color:#e2e8f0;" title="Show password">
                        <svg id="eyeIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:1.25rem;height:1.25rem;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                        <svg id="eyeOffIcon" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:1.25rem;height:1.25rem;display:none;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L6.59 6.59m7.532 7.532l3.29 3.29M3 3l18 18"></path></svg>
                    </button>
                </div>
            </div>
            <div id="loginError" class="login-error" style="display:none;"></div>
            <button type="submit" id="loginBtn" class="login-btn mt-6">Sign In</button>
        </form>
    </div>
</div>

<div id="dashboardContent" class="max-w-5xl mx-auto" style="display:none;">
    
    <!-- Header with Logout -->
    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-8 animate-fade-in">
        <header class="space-y-1">
            <h1 class="text-3xl sm:text-4xl font-bold bg-gradient-to-r from-blue-600 to-blue-800 bg-clip-text text-transparent">AutoPost Dashboard</h1>
            <p class="text-base sm:text-lg text-slate-600">SCCSE Cross Platform Post. Manage unique content for every platform.</p>
        </header>
        <button id="logoutBtn" class="inline-flex items-center justify-center gap-2 px-5 sm:px-6 py-2.5 sm:py-3 bg-gradient-to-r from-slate-600 to-slate-700 hover:from-slate-700 hover:to-slate-800 text-white rounded-xl font-semibold transition-all duration-200 shadow-lg hover:shadow-xl active:scale-95 whitespace-nowrap flex-shrink-0" style="display:none;" onclick="handleLogout()">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            <span class="hidden sm:inline">Logout</span>
        </button>
    </div>

    <!-- Global Alert Box -->
    <div id="alertBox" class="hidden p-4 sm:p-6 rounded-xl border shadow-lg flex flex-col gap-4 transition-all animate-fade-in">
        <div class="flex items-start gap-3">
            <svg id="alertIcon" class="w-6 h-6 flex-shrink-0 mt-0.5" fill="currentColor" viewBox="0 0 20 20"></svg>
            <span id="alertMessage" class="font-medium flex-1"></span>
            <button onclick="hideAlert()" class="text-slate-400 hover:text-slate-600 focus:outline-none flex-shrink-0">
                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"></path>
                </svg>
            </button>
        </div>
    </div>

    <form id="postForm" class="space-y-8">
        <!-- Configuration Card -->
        <div class="modern-card rounded-2xl shadow-sm border overflow-hidden">
            <div class="bg-gradient-to-r from-blue-50 to-blue-100 border-b border-blue-200 px-4 sm:px-8 py-4 sm:py-6">
                <h2 class="text-lg sm:text-xl font-bold text-blue-900 flex items-center gap-3">
                    <span class="inline-flex items-center justify-center w-9 h-9 rounded-lg bg-blue-600 text-white">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    </span>
                    Post Configuration
                </h2>
            </div>
            <div class="p-6 sm:p-8 space-y-8">
                <!-- Destinations -->
                <div class="space-y-4">
                    <span class="block text-sm font-bold text-slate-800 uppercase tracking-wide">Select Platforms:</span>
                    <div class="grid grid-cols-2 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                        <label class="relative flex flex-col items-center justify-center p-4 border-2 border-slate-200 rounded-xl cursor-pointer bg-white hover:bg-slate-50 hover:border-blue-400 transition-all hover:shadow-md group">
                            <input type="checkbox" name="platforms" value="linkedin" checked class="platform-checkbox sr-only peer">
                            <span class="text-2xl mb-2 group-hover:scale-110 transition-transform">in</span>
                            <span class="text-xs font-bold text-slate-700 peer-checked:text-blue-600">LinkedIn</span>
                            <div class="absolute inset-0 rounded-xl border-2 border-blue-500 opacity-0 peer-checked:opacity-100 pointer-events-none"></div>
                        </label>
                        <label class="relative flex flex-col items-center justify-center p-4 border-2 border-slate-200 rounded-xl cursor-pointer bg-white hover:bg-slate-50 hover:border-slate-900 transition-all hover:shadow-md group">
                            <input type="checkbox" name="platforms" value="x" checked class="platform-checkbox sr-only peer">
                            <span class="text-2xl mb-2 group-hover:scale-110 transition-transform">𝕏</span>
                            <span class="text-xs font-bold text-slate-700 peer-checked:text-slate-900">X</span>
                            <div class="absolute inset-0 rounded-xl border-2 border-slate-900 opacity-0 peer-checked:opacity-100 pointer-events-none"></div>
                        </label>
                        <label class="relative flex flex-col items-center justify-center p-4 border-2 border-slate-200 rounded-xl cursor-pointer bg-white hover:bg-slate-50 hover:border-pink-400 transition-all hover:shadow-md group">
                            <input type="checkbox" name="platforms" value="instagram" checked class="platform-checkbox sr-only peer">
                            <span class="text-2xl mb-2 group-hover:scale-110 transition-transform">📸</span>
                            <span class="text-xs font-bold text-slate-700 peer-checked:text-pink-600">Instagram</span>
                            <div class="absolute inset-0 rounded-xl border-2 border-pink-500 opacity-0 peer-checked:opacity-100 pointer-events-none"></div>
                        </label>
                        <label class="relative flex flex-col items-center justify-center p-4 border-2 border-slate-200 rounded-xl cursor-pointer bg-white hover:bg-slate-50 hover:border-blue-600 transition-all hover:shadow-md group">
                            <input type="checkbox" name="platforms" value="facebook" checked class="platform-checkbox sr-only peer">
                            <span class="text-2xl mb-2 group-hover:scale-110 transition-transform">f</span>
                            <span class="text-xs font-bold text-slate-700 peer-checked:text-blue-700">Facebook</span>
                            <div class="absolute inset-0 rounded-xl border-2 border-blue-700 opacity-0 peer-checked:opacity-100 pointer-events-none"></div>
                        </label>
                    </div>
                </div>

                <!-- Mode Selector -->
                <div class="space-y-4">
                    <span class="block text-sm font-bold text-slate-800 uppercase tracking-wide">Content Mode:</span>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">

                            <input type="radio" name="mode" value="same" checked class="sr-only">
                            <svg class="w-6 h-6 mb-2 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M6 13l3 3m0 0l3-3m-3 3V5"></path></svg>
                            <span class="block text-sm font-bold text-blue-900">Same Content</span>
                            <span class="mt-1 block text-xs text-blue-700">Post identical content to all platforms.</span>
                        </label>
                        <label class="relative flex flex-col p-5 border-2 rounded-xl cursor-pointer focus:outline-none transition group hover:shadow-lg border-slate-300 bg-white" id="modeCustomLabel">
                            <input type="radio" name="mode" value="custom" class="sr-only">
                            <svg class="w-6 h-6 mb-2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                            <span class="block text-sm font-bold text-slate-700">Custom Content</span>
                            <span class="mt-1 block text-xs text-slate-500">Tailor unique posts for each platform.</span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dynamic Content Sections -->
        <div id="dynamicInputs" class="space-y-6"></div>

        <!-- Submit Button -->
        <div class="flex justify-center sm:justify-end pt-6">
            <button type="submit" id="submitPostBtn" class="w-full sm:w-auto inline-flex justify-center items-center gap-3 py-3 sm:py-4 px-8 sm:px-10 rounded-xl shadow-lg text-base sm:text-lg font-bold text-white bg-gradient-to-r from-blue-600 via-blue-700 to-blue-800 hover:from-blue-700 hover:via-blue-800 hover:to-blue-900 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed min-w-fit">
                <svg id="submitIcon" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                <span id="submitPostText">Publish Post</span>
            </button>
        </div>
    </form>
</div> <!-- end dashboardContent -->

<!-- Image Lightbox Modal -->
<div id="lightbox" onclick="this.style.display='none'">
    <span class="lightbox-close">&times;</span>
    <img id="lightboxImg" src="" onclick="event.stopPropagation()">
</div>

<script>
    function openLightbox(src) {
        const lightbox = document.getElementById('lightbox');
        const img = document.getElementById('lightboxImg');
        img.src = src;
        lightbox.style.display = 'flex';
    }

    function togglePasswordVisibility() {
        const input = document.getElementById('loginPassword');
        const eyeIcon = document.getElementById('eyeIcon');
        const eyeOffIcon = document.getElementById('eyeOffIcon');
        if (input.type === 'password') {
            input.type = 'text';
            eyeIcon.style.display = 'none';
            eyeOffIcon.style.display = '';
        } else {
            input.type = 'password';
            eyeIcon.style.display = '';
            eyeOffIcon.style.display = 'none';
        }
    }

    // --- Auth Helpers ---
    function getAuthToken() { return sessionStorage.getItem('auth_token'); }
    function setAuthToken(token) { sessionStorage.setItem('auth_token', token); }
    function clearAuthToken() { sessionStorage.removeItem('auth_token'); }

    function showDashboard() {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('dashboardContent').style.display = '';
        document.getElementById('logoutBtn').style.display = '';
    }
    function showLogin() {
        document.getElementById('loginOverlay').classList.remove('hidden');
        document.getElementById('dashboardContent').style.display = 'none';
        document.getElementById('logoutBtn').style.display = 'none';
    }

    async function handleLogout() {
        const API_BASE_URL = await resolveApiBaseUrl();
        const token = getAuthToken();
        try {
            await fetch(`${API_BASE_URL}/logout`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
        } catch {}
        clearAuthToken();
        showLogin();
    }

    // --- API Configuration ---
    async function resolveApiBaseUrl() {
        if (typeof window.__BACKEND_API_BASE__ === 'string' && window.__BACKEND_API_BASE__.length) {
            return window.__BACKEND_API_BASE__.replace(/\/$/, '');
        }
        try {
            const res = await fetch('/api/config');
            if (res.ok) {
                const data = await res.json();
                return (data.api_base_url || '').trim().replace(/\/$/, '');
            }
        } catch {}
        return window.location.origin.replace(/\/$/, '') + '/api';
    }

    // --- UI Helpers ---
    function showAlert(message, isSuccess, platforms = {}) {
        const alertBox = document.getElementById('alertBox');
        const alertIcon = document.getElementById('alertIcon');
        const alertMessage = document.getElementById('alertMessage');
        alertMessage.innerHTML = `<p class="font-bold text-lg">${message}</p>`;

        if (isSuccess && platforms && Object.keys(platforms).length > 0) {
            const container = document.createElement('div');
            container.className = 'mt-4 space-y-3 w-full';
            
            const resolvedLinks = {};

            Object.entries(platforms).forEach(([name, res]) => {
                const pKey = name.toLowerCase();
                const group = document.createElement('div');
                group.className = 'flex items-center space-x-3 bg-white/70 p-3 rounded-lg border border-emerald-200 shadow-md backdrop-blur-sm';
                
                const label = document.createElement('span');
                label.className = 'text-xs font-black uppercase tracking-widest text-emerald-700 w-20 flex-shrink-0';
                label.innerText = pKey;
                group.appendChild(label);

                const statusSpan = document.createElement('span');
                statusSpan.className = 'flex-1 text-sm text-emerald-800 font-medium flex items-center justify-between overflow-hidden';
                
                if (res.link) {
                    resolvedLinks[pKey] = res.link;
                    renderLinkGroup(statusSpan, res.link);
                } else {
                    statusSpan.innerHTML = `<span class="flex items-center text-slate-600 italic"><span class="loader-sm mr-2"></span> Processing...</span>`;
                    pollForLink(pKey, res.post_id, statusSpan, res.fallback, resolvedLinks);
                }
                
                group.appendChild(statusSpan);
                container.appendChild(group);
            });

            const copyBtnContainer = document.createElement('div');
            copyBtnContainer.className = 'mt-4 pt-4 border-t border-emerald-200';
            
            const copyAllBtn = document.createElement('button');
            copyAllBtn.type = 'button';
            copyAllBtn.className = 'w-full py-3 bg-gradient-to-r from-emerald-500 to-emerald-600 hover:from-emerald-600 hover:to-emerald-700 text-white font-bold rounded-lg transition-all text-sm flex items-center justify-center focus:outline-none shadow-md hover:shadow-lg active:scale-95';
            const copyIcon = `<svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"></path></svg>`;
            copyAllBtn.innerHTML = `${copyIcon} Copy All Links`;
            
            const formatUrl = (platform, url) => {
                if (!url) return '';
                if (platform === 'x' || platform === 'twitter') {
                    return url.replace('twitter.com', 'x.com');
                }
                return url;
            };

            copyAllBtn.onclick = async () => {
                const parts = [];
                if (resolvedLinks['instagram']) parts.push(`Instagram : ${formatUrl('instagram', resolvedLinks['instagram'])}`);
                if (resolvedLinks['facebook']) parts.push(`Facebook : ${formatUrl('facebook', resolvedLinks['facebook'])}`);
                if (resolvedLinks['linkedin']) parts.push(`LinkedIn : ${formatUrl('linkedin', resolvedLinks['linkedin'])}`);
                if (resolvedLinks['x'] || resolvedLinks['twitter']) parts.push(`Twitter : ${formatUrl('x', resolvedLinks['x'] || resolvedLinks['twitter'])}`);
                
                const text = parts.join('\n');
                if (!text) {
                    alert("No links ready yet! Please wait for posts to finish processing.");
                    return;
                }
                
                try {
                    await navigator.clipboard.writeText(text);
                    copyAllBtn.innerHTML = `<svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Copied!`;
                    copyAllBtn.classList.add('from-emerald-700', 'to-emerald-800');
                    setTimeout(() => {
                        copyAllBtn.innerHTML = `${copyIcon} Copy All Links`;
                        copyAllBtn.classList.remove('from-emerald-700', 'to-emerald-800');
                    }, 2000);
                } catch (e) {
                    console.error("Copy failed", e);
                }
            };
            
            copyBtnContainer.appendChild(copyAllBtn);
            container.appendChild(copyBtnContainer);

            alertMessage.appendChild(container);
        }
        alertBox.className = `p-6 rounded-xl border shadow-lg flex items-start gap-4 transition-all mb-8 animate-fade-in ${isSuccess ? 'bg-gradient-to-r from-emerald-50 to-emerald-100 border-emerald-300 text-emerald-900' : 'bg-gradient-to-r from-red-50 to-red-100 border-red-300 text-red-900'}`;
        alertIcon.innerHTML = isSuccess ? '<path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"/>' : '<path d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"/>';
        alertIcon.setAttribute('viewBox', '0 0 20 20');
        alertIcon.className = `w-7 h-7 flex-shrink-0 mt-0.5 ${isSuccess ? 'text-emerald-600' : 'text-red-600'}`;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function renderLinkGroup(container, url) {
        container.innerHTML = `
            <div class="flex items-center space-x-2">
                <a href="${url}" target="_blank" class="hover:underline flex items-center font-bold">View Post</a>
                <span class="text-emerald-300">|</span>
                <button type="button" class="copy-btn hover:text-emerald-900 transition flex items-center">
                    Copy Link
                </button>
            </div>
            <svg class="w-4 h-4 text-emerald-400 flex-shrink-0 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
        `;
        const btn = container.querySelector('.copy-btn');
        btn.onclick = async () => {
            try {
                await navigator.clipboard.writeText(url);
                const originalText = btn.innerText;
                btn.innerText = 'Copied!';
                btn.classList.add('text-emerald-900');
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.remove('text-emerald-900');
                }, 2000);
            } catch (err) {
                console.error("Copy failed", err);
            }
        };
    }

    async function pollForLink(platform, postId, statusSpan, fallback, resolvedLinks = null) {
        const API_BASE_URL = await resolveApiBaseUrl();
        const maxAttempts = 20; // 20 * 3s = 60s max wait
        let consecutiveErrors = 0;
        
        for (let i = 0; i < maxAttempts; i++) {
            if (!document.body.contains(statusSpan)) return; // Stop if UI element removed

            await new Promise(r => setTimeout(r, 3000)); // wait 3s between calls
            
            try {
                const res = await fetch(`${API_BASE_URL}/check-link?post_id=${postId}&platform=${platform}`);
                
                // Retry on server errors — the post was already submitted, so transient 5xx is expected
                if (res.status >= 500) {
                    consecutiveErrors++;
                    let errMsg = "Server error";
                    try { const d = await res.json(); errMsg = d.error || errMsg; } catch {}
                    console.warn(`[${platform}] check-link 500 (attempt ${consecutiveErrors}):`, errMsg);
                    
                    if (consecutiveErrors >= 5) {
                        statusSpan.innerHTML = `
                            <div class="flex items-center space-x-2">
                                <span class="text-amber-600 font-bold flex items-center cursor-help" title="${errMsg}">
                                    <svg class="w-4 h-4 mr-1 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
                                    <span class="truncate max-w-[120px]">Posted (link pending)</span>
                                </span>
                                <span class="text-slate-300">|</span>
                                <a href="${fallback}" target="_blank" class="hover:underline flex items-center font-bold text-amber-700 text-sm">Check Profile &rarr;</a>
                            </div>
                        `;
                        return;
                    }
                    continue; // retry
                }

                if (res.status === 404) {
                    console.error(`[${platform}] check-link 404: post not found`);
                    statusSpan.innerHTML = `<a href="${fallback}" target="_blank" class="hover:underline flex items-center text-amber-700 font-medium italic">Post not found (Check Profile)</a>`;
                    return;
                }

                const data = await res.json();
                consecutiveErrors = 0; // reset on successful response

                if (data.ready) {
                    if (resolvedLinks) resolvedLinks[platform] = data.link;
                    renderLinkGroup(statusSpan, data.link);
                    return;
                }
                
                if (data.status === "failed" || data.status === "error") {
                    const errorMsg = data.error_message || "Post Failed";
                    statusSpan.innerHTML = `
                        <div class="flex items-center space-x-2">
                            <span class="text-red-600 font-bold flex items-center cursor-help" title="${errorMsg}">
                                <svg class="w-4 h-4 mr-1 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"/></svg>
                                <span class="truncate max-w-[120px]">${errorMsg}</span>
                            </span>
                            <span class="text-slate-300">|</span>
                            <a href="${fallback}" target="_blank" class="hover:underline flex items-center font-bold text-red-600 text-sm">Post Manually &rarr;</a>
                        </div>
                    `;
                    return;
                }
            } catch (err) {
                consecutiveErrors++;
                console.error("Polling error:", err);
                // Stop after 3 consecutive network errors
                if (consecutiveErrors >= 3) {
                    statusSpan.innerHTML = `<a href="${fallback}" target="_blank" class="hover:underline flex items-center text-amber-700 font-medium italic">Network error (Check Profile)</a>`;
                    return;
                }
            }
        }
        
        // Final resort if still not ready
        statusSpan.innerHTML = `<a href="${fallback}" target="_blank" class="hover:underline flex items-center text-amber-700 font-medium italic">Delayed (Check Profile)</a>`;
    }

    function hideAlert() { document.getElementById('alertBox').classList.add('hidden'); }

    // --- State Management ---
    const state = {
        mode: 'same', // 'same' or 'custom'
        selectedPlatforms: ['linkedin', 'x', 'instagram', 'facebook'],
        // Data for each platform (including 'global' for same mode)
        platformData: {
            global: { content: '', files: [] },
            linkedin: { content: '', files: [] },
            x: { content: '', files: [] },
            instagram: { content: '', files: [] },
            facebook: { content: '', files: [] }
        }
    };

    function renderInputs() {
        const container = document.getElementById('dynamicInputs');
        container.innerHTML = '';

        if (state.mode === 'same') {
            container.appendChild(createSection('global', 'Shared Post Content'));
        } else {
            state.selectedPlatforms.forEach(p => {
                let label = '';
                if (p === 'linkedin') label = 'LinkedIn Content';
                else if (p === 'x') label = 'X (Twitter) Content';
                else if (p === 'instagram') label = 'Instagram Content';
                else if (p === 'facebook') label = 'Facebook Content';
                container.appendChild(createSection(p, label));
            });
        }
        
        if (state.selectedPlatforms.length === 0) {
            container.innerHTML = '<div class="p-8 text-center text-slate-500 italic bg-slate-50 rounded-2xl border-2 border-dashed border-slate-200">Select at least one platform to begin.</div>';
        }
    }

    function createSection(pKey, title) {
        const section = document.createElement('div');
        section.className = 'modern-card rounded-2xl shadow-sm border overflow-hidden';
        
        const platformData = state.platformData[pKey];
        const isGlobal = pKey === 'global';
        
        const gradients = {
            'global': 'from-slate-50 to-slate-100 border-b-slate-200',
            'linkedin': 'from-blue-50 to-blue-100 border-b-blue-200',
            'x': 'from-slate-50 to-slate-100 border-b-slate-200',
            'instagram': 'from-pink-50 to-pink-100 border-b-pink-200',
            'facebook': 'from-blue-50 to-cyan-100 border-b-blue-200'
        };
        
        const icons = {
            'global': '📋',
            'linkedin': 'in',
            'x': '𝕏',
            'instagram': '📸',
            'facebook': 'f'
        };

        const gradient = gradients[pKey] || gradients['global'];
        const icon = icons[pKey] || icons['global'];

        section.innerHTML = `
            <div class="bg-gradient-to-r ${gradient} px-6 sm:px-8 py-4 sm:py-5 flex items-center gap-3 border">
                <span class="text-2xl">${icon}</span>
                <h3 class="font-bold text-base sm:text-lg text-slate-900">${title}</h3>
            </div>
            <div class="p-6 sm:p-8 space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-700 mb-2 uppercase tracking-wide">Post Message</label>
                    <textarea class="content-input w-full rounded-lg border-2 border-slate-200 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 shadow-sm p-4 text-sm text-slate-700 placeholder-slate-400 transition-colors" 
                        rows="5" placeholder="Write your post content here..." data-key="${pKey}">${platformData.content}</textarea>
                </div>
                
                <div class="file-upload-zone">
                    <label class="flex flex-col items-center justify-center w-full h-28 border-2 border-dashed border-slate-300 rounded-lg cursor-pointer bg-gradient-to-br from-slate-50 to-white hover:from-slate-100 hover:to-slate-50 transition-all hover:border-blue-400 group">
                        <div class="flex flex-col items-center justify-center py-6">
                            <svg class="w-8 h-8 mb-2 text-slate-400 group-hover:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
                            <p class="text-sm text-slate-700 font-semibold"><span class="text-blue-600">Click to upload</span> or drag and drop</p>
                            <p class="text-xs text-slate-500 mt-1">PNG, JPG, GIF, WebP (auto-compressed for upload)</p>
                        </div>
                        <input type="file" class="file-input hidden" accept="image/*" multiple data-key="${pKey}">
                    </label>
                    <div class="preview-container flex flex-wrap gap-3 mt-5" data-key="${pKey}"></div>
                </div>
            </div>
        `;

        // Textarea Sync
        const textarea = section.querySelector('.content-input');
        textarea.addEventListener('input', (e) => state.platformData[pKey].content = e.target.value);

        // File Handling
        const fileInput = section.querySelector('.file-input');
        const previews = section.querySelector('.preview-container');
        
        const updatePreviews = () => {
            previews.innerHTML = '';
            state.platformData[pKey].files.forEach((file, idx) => {
                const div = document.createElement('div');
                div.className = 'relative w-16 h-16 sm:w-20 sm:h-20 rounded-lg border-2 border-slate-200 shadow-sm group overflow-hidden bg-slate-50 hover:border-blue-400 transition-colors';

                const reader = new FileReader();
                reader.onload = (e) => {
                    div.classList.add('cursor-zoom-in');
                    div.innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover" onclick="openLightbox('${e.target.result}')">
                        <button type="button" class="absolute top-1 right-1 bg-red-500 hover:bg-red-600 text-white p-1 rounded shadow-lg hidden group-hover:flex items-center justify-center transition-colors" data-idx="${idx}" style="width:28px;height:28px;">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>`;
                    div.querySelector('button').onclick = (ev) => {
                        ev.stopPropagation();
                        state.platformData[pKey].files.splice(idx, 1);
                        updatePreviews();
                    };
                };
                reader.readAsDataURL(file);
                previews.appendChild(div);
            });
        };

        fileInput.addEventListener('change', (e) => {
            const files = Array.from(e.target.files).filter(f => 
                f.type.startsWith('image/')
            );
            state.platformData[pKey].files = [...state.platformData[pKey].files, ...files];
            updatePreviews();
            e.target.value = ''; // Reset for next selection
        });

        // Initialize previews if data exists
        if (platformData.files.length) updatePreviews();

        return section;
    }

    // --- Core Logic ---
    document.addEventListener('DOMContentLoaded', async () => {
        const API_BASE_URL = await resolveApiBaseUrl();

        // --- Login Form ---
        const loginForm = document.getElementById('loginForm');
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const loginBtn = document.getElementById('loginBtn');
            const loginError = document.getElementById('loginError');
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value.trim();

            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
            loginError.style.display = 'none';

            try {
                const res = await fetch(`${API_BASE_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success && data.token) {
                    setAuthToken(data.token);
                    showDashboard();
                } else {
                    loginError.textContent = data.message || 'Login failed.';
                    loginError.style.display = 'block';
                }
            } catch (err) {
                loginError.textContent = 'Network error. Please try again.';
                loginError.style.display = 'block';
            } finally {
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
            }
        });

        // Check for existing session
        if (getAuthToken()) {
            showDashboard();
        } else {
            showLogin();
        }

        // Platform Selection
        document.querySelectorAll('.platform-checkbox').forEach(cb => {
            cb.addEventListener('change', () => {
                state.selectedPlatforms = Array.from(document.querySelectorAll('.platform-checkbox:checked')).map(el => el.value);
                renderInputs();
            });
        });

        // Mode Switching
        document.querySelectorAll('input[name="mode"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                state.mode = e.target.value;
                document.getElementById('modeSameLabel').className = state.mode === 'same' ? 'relative flex flex-col p-5 border-2 rounded-xl cursor-pointer transition group hover:shadow-lg border-blue-500 bg-gradient-to-br from-blue-50 to-blue-100 shadow-md' : 'relative flex flex-col p-5 border-2 rounded-xl cursor-pointer transition group hover:shadow-lg border-slate-300 bg-white';
                document.getElementById('modeCustomLabel').className = state.mode === 'custom' ? 'relative flex flex-col p-5 border-2 rounded-xl cursor-pointer transition group hover:shadow-lg border-blue-500 bg-gradient-to-br from-blue-50 to-blue-100 shadow-md' : 'relative flex flex-col p-5 border-2 rounded-xl cursor-pointer transition group hover:shadow-lg border-slate-300 bg-white';
                renderInputs();
            });
        });

        // --- Client-side image compression (light) ---
        function compressImage(file, maxDim = 1920, quality = 0.88) {
            return new Promise((resolve) => {
                // Skip non-image or small files (<1MB)
                if (!file.type.startsWith('image/') || file.size < 1048576) {
                    resolve(file);
                    return;
                }
                const img = new Image();
                const url = URL.createObjectURL(file);
                img.onload = () => {
                    URL.revokeObjectURL(url);
                    let { width, height } = img;
                    if (width > maxDim || height > maxDim) {
                        const scale = maxDim / Math.max(width, height);
                        width = Math.round(width * scale);
                        height = Math.round(height * scale);
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    canvas.toBlob((blob) => {
                        if (!blob || blob.size >= file.size) {
                            resolve(file);
                            return;
                        }
                        const ext = file.name.replace(/\.[^.]+$/, '');
                        resolve(new File([blob], ext + '.jpg', { type: 'image/jpeg' }));
                    }, 'image/jpeg', quality);
                };
                img.onerror = () => { URL.revokeObjectURL(url); resolve(file); };
                img.src = url;
            });
        }

        async function compressFiles(files) {
            return Promise.all(files.map(f => compressImage(f)));
        }

        // --- File dedup: hash binary content via SHA-256 ---
        async function getFileHash(file) {
            const buffer = await file.arrayBuffer();
            const hashBuf = await crypto.subtle.digest('SHA-256', buffer);
            const arr = Array.from(new Uint8Array(hashBuf));
            return arr.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // Form Submit
        const postForm = document.getElementById('postForm');
        const submitBtn = document.getElementById('submitPostBtn');
        const submitText = document.getElementById('submitPostText');

        postForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideAlert();

            if (state.selectedPlatforms.length === 0) {
                showAlert("Please select at least one platform.", false);
                return;
            }

            submitBtn.disabled = true;
            submitText.innerHTML = '<span class="loader"></span> Publishing...';

            try {
                const formData = new FormData();
                formData.append('mode', state.mode);
                formData.append('platforms', state.selectedPlatforms.join(','));

                if (state.mode === 'same') {
                    formData.append('content', state.platformData.global.content);
                    const compressed = await compressFiles(state.platformData.global.files);
                    compressed.forEach(f => formData.append('images', f));
                } else {
                    // Deduplicate files across platforms by binary content
                    const hashToIndex = new Map(); // SHA-256 hash -> pool index
                    const uniqueFiles = [];        // pool of unique compressed files
                    const platformIndices = {};    // platform -> [index, index, ...]

                    for (const p of state.selectedPlatforms) {
                        formData.append(`${p}_content`, state.platformData[p].content);
                        platformIndices[p] = [];
                        const compressed = await compressFiles(state.platformData[p].files);
                        for (const file of compressed) {
                            const hash = await getFileHash(file);
                            if (!hashToIndex.has(hash)) {
                                hashToIndex.set(hash, uniqueFiles.length);
                                uniqueFiles.push(file);
                            }
                            platformIndices[p].push(hashToIndex.get(hash));
                        }
                        formData.append(`${p}_image_indices`, platformIndices[p].join(','));
                    }

                    // Send each unique file only once
                    uniqueFiles.forEach(f => formData.append('shared_images', f));
                }

                const response = await fetch(`${API_BASE_URL}/post`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${getAuthToken()}` },
                    body: formData
                });

                // If 401, force re-login
                if (response.status === 401) {
                    clearAuthToken();
                    showLogin();
                    showAlert('Session expired. Please log in again.', false);
                    return;
                }
                
                const data = await response.json();
                showAlert(data.message, data.success, data.platforms);
                
                if (data.success) {
                    // Reset platform data
                    Object.values(state.platformData).forEach(d => { d.content = ''; d.files = []; });
                    renderInputs();
                }
            } catch (err) {
                showAlert(`Error: ${err.message}`, false);
            } finally {
                submitBtn.disabled = false;
                submitText.innerHTML = '<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg> Publish Post';
            }
        });

        // Init
        renderInputs();
    });
</script>
